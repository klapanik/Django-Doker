<!doctype html>
{% extends "learning_logs/base.html" %}
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Topics</title>
    </head>
    <body>
        {% block content %}
        <p>All topics will be here</p>
        <ul>
            { % for topic in topics % }
            <li>{{topic}}</li>
            { % empty % }
            <li>No topics have been added yet</li>
            { % endfor % }
        </ul>
        {% endblock content %}
    </body>
</html>
