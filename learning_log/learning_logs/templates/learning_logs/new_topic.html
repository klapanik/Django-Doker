<!doctype html>
{% extends "learning_logs/base.html" %}
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        {% block content %}
        <p>Add new topic:</p>

        </form>
        {% endblock content %}
    </body>
</html>
